name: Run Daily Script

on:
  schedule:
    - cron: "55 21 * * *"   # runs every 9pm UTC and 5pm NYC time
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run script
        run: python main.py
